services:
  mcp-server:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: always

  # Optional: Scheduler to update data periodically
  data-updater:
    build: .
    volumes:
      - ./data:/app/data
    command: ["python", "pipeline/process_radar.py"]
    # In a real setup, you might use a cron job or a simple loop
